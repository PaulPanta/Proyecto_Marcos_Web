<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>QuickServices</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="login_estilos.css">

</head>

<body>

<!-- LOGIN Y REGISTRO -->

<div class="container-login" id="pantallaLogin">

    <div class="card shadow main-card">

        <div class="row">

            <!-- FORMULARIOS -->

            <div class="col-md-6 p-5">

                <!-- LOGIN -->

                <form id="formLogin">

                    <h1 class="mb-4">
                        Iniciar Sesión
                    </h1>

                    <div class="mb-3">

                        <label class="form-label">
                            Correo
                        </label>

                        <input type="text"
                        id="loginEmail"
                        class="form-control"
                        placeholder="Ingrese su correo">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Contraseña
                        </label>

                        <input type="password"
                        id="loginPassword"
                        class="form-control"
                        placeholder="Ingrese su contraseña">

                    </div>

                    <button type="submit"
                    class="btn btn-primary w-100 mb-3">

                        Iniciar Sesión

                    </button>

                    <p class="text-center">

                        ¿No tienes cuenta?

                        <a href="javascript:void(0)"
                        id="btnMostrarRegistro">

                            Registrarse

                        </a>

                    </p>

                </form>


                <!-- REGISTRO -->

                <form id="formRegistro"
                style="display:none;">

                    <h1 class="mb-4">
                        Registrarse
                    </h1>

                    <div class="mb-3">

                        <label class="form-label">
                            Nombre
                        </label>

                        <input type="text"
                        id="registroNombre"
                        class="form-control"
                        placeholder="Ingrese su nombre">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Correo
                        </label>

                        <input type="text"
                        id="registroEmail"
                        class="form-control"
                        placeholder="Ingrese su correo">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Contraseña
                        </label>

                        <input type="password"
                        id="registroPassword"
                        class="form-control"
                        placeholder="Ingrese su contraseña">

                    </div>

                    <button type="submit"
                    class="btn btn-primary w-100 mb-3">

                        Registrarse

                    </button>

                    <p class="text-center">

                        ¿Ya tienes cuenta?

                        <a href="javascript:void(0)"
                        id="btnMostrarLogin">

                            Iniciar sesión

                        </a>

                    </p>

                </form>

            </div>

            <!-- PANEL DERECHO -->

            <div class="col-md-6 left-panel text-white p-5">

                <h2>
                    QuickService
                </h2>

                <p class="mt-3">

                    Servicios rápidos y soluciones confiables

                </p>

                <img src="img/fondo.png"
                class="img-fluid img-tecnico">

            </div>

        </div>

    </div>

</div>


<!-- SELECCION -->

<div class="container-login"
id="pantallaSeleccion"
style="display:none;">

    <div class="card shadow seleccion-card p-5">

        <h2 class="text-center mb-5">
            Seleccione su tipo de usuario
        </h2>

        <div class="row text-center">

            <!-- CLIENTE -->

            <div class="col-md-6 mb-4">

                <div id="btnCliente"
                class="opcion-usuario">

                    <img src="img/cliente.png"
                    class="img-opcion">

                    <h4 class="mt-3">
                        Cliente
                    </h4>

                </div>

            </div>

            <!-- PROVEEDOR -->

            <div class="col-md-6 mb-4">

                <div id="btnProveedor"
                class="opcion-usuario">

                    <img src="img/proveedor.png"
                    class="img-opcion">

                    <h4 class="mt-3">
                        Proveedor
                    </h4>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
