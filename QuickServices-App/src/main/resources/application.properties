spring.application.name=QuickServices

# Configuración de Base de Datos
spring.datasource.url=jdbc:mysql://localhost:3306/quickservice?createDatabaseIfNotExist=true
spring.datasource.username=root
# Cambia Dayana11 por tu contraseña de MySQL de Laragon si es diferente
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Desarrollo y Recarga en vivo
spring.thymeleaf.cache=false
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false
