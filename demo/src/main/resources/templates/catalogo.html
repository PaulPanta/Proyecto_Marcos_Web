<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
  <title>Catálogo de Servicios</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

</head>

<body>

  <nav class="navbar bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand">Explora Nuestros Servicios</a>
      <form class="d-flex" role="search">
        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
        <button class="btn btn-outline-success" type="submit">Search</button>
      </form>
    </div>
  </nav>

  <div class="contenido">
    <div class="container pb-5">
      <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">

        <div class="col" th:each="servicio : ${servicios}">
          <div class="card h-100">
            <img class="card-img-top" th:src="${servicio.imagenUrl}" th:alt="${servicio.nombre}">
            <div class="card-body d-flex flex-column">
              <h4 class="card-title fw-bold" th:text="${servicio.nombre}">Nombre</h4>
              <p class="card-text text-muted" th:text="${servicio.categoria}">Categoría</p>
              <p><strong th:text="'Desde S/.' + ${servicio.precio}">S/. 0</strong></p>
              <p>Estado:
                <span class="badge text-white" th:text="${servicio.estado}"
                  th:classappend="${servicio.estado == 'Activo'} ? 'badge-activo' : 'badge-inactivo'">
                </span>
              </p>
              <p class="card-text small text-muted" th:text="${servicio.descripcion}">Descripción</p>
              <div class="mt-auto">
                <button class="btn btn-primary w-100" th:classappend="${servicio.estado != 'Activo'} ? 'disabled'"
                  th:text="${servicio.estado == 'Activo'} ? 'CONTÁCTAME' : 'NO DISPONIBLE'">
                </button>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <footer class="bg-dark text-white mt-5 py-5">
      <div class="container">
        <p class="text-center">&copy; 2023 Explora Nuestros Servicios. Todos los derechos reservados.</p>
      </div>
    </footer>

  </div>



  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
